# CI — der Sensor-Lauf auf frischem Klon (slice-027).
#
# Schliesst die MR-003-Restluecke: der lokale Stop-Hook gibt einen frisch
# geklonten, cleanen Tree OHNE Nachweis frei ("CI ist dort das Netz"). Hier IST
# das Netz. Jeder Job checkt frisch aus und faehrt ein `make`-Target — die CI
# traegt KEINE zweite Definition dessen, was ein Gate ist (MR-010-Geist: eine
# Quelle). Was hier gruen sein muss, ist genau `make gates`/`smoke`/`full-smoke`/`mutate`.
#
# Frequenz (slice-027 Entwurfsentscheidung "alles pro Push"): gates + smoke +
# full-smoke + mutate bei jedem Push und PR; die NETZ-Sensoren (regelwerk-check,
# baseline-freshness) laufen NUR naechtlich (schedule) — ein Upstream-Ausfall
# darf nie einen Push blockieren (slice-027 Paragraph 6).
#
# Docker-only (ADR-0003): die Runner bringen Docker mit; keine Host-Go-Toolchain,
# kein `actions/setup-go`. Alles laeuft in den gepinnten Images der make-Targets.

name: ci

on:
  # push deckt direkte main-Pushes (der aktuelle Arbeitsstil), pull_request die
  # Absicherung VOR einem Merge. Bei einem same-repo-Branch-PR triggern beide —
  # ein bewusst akzeptierter Doppellauf (getrennte concurrency-Gruppen, s. u.);
  # der Preis ist ein doppelter Lauf, der Gewinn die Fork-PR-Abdeckung.
  push:
  pull_request:
  schedule:
    - cron: '0 1 * * *' # taeglich 01:00 UTC — nur der Netz-Nachtlauf unten

# Nicht zwei Laeufe DESSELBEN Ausloesers parallel: `make mutate` mutiert den
# Checkout, zwei Laeufe verbrennen CI-Minuten (die Korrektheit ist durch getrennte
# Runner sicher) — den aelteren abbrechen ist billiger.
#
# `event_name` MUSS in die Gruppe: sonst teilen sich schedule und push auf `main`
# denselben `github.ref`, und ein Push braeche den naechtlichen Netz-Lauf ab (oder
# umgekehrt) — Review-Befund slice-027 F-1. So bekommt jeder Ausloeser seine
# eigene Gruppe.
concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Der Kern: make gates auf FRISCHEM Klon. Genau der Fall, den der lokale
  # Stop-Hook nicht pruefen kann (MR-003).
  gates:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make gates

  # Tier-2-Emit-Smoke (Host-Docker, ggf. Netz-Pull des d-check-Image).
  smoke:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make smoke

  # Voll-E2E-Smoke (slice-024): Bootstrap -> im Ziel der ZUSAMMENGEFUEHRTE make gates
  # (MR-010: docs-check + Go-Gates in einem Lauf) — der LH-FA-01-Happy-Path, dass ein
  # frisch gebootstrapptes Repo out-of-the-box gruen faehrt. Host-Docker + ggf.
  # Netz-Pull, wie smoke; der Sensor braucht diesen mechanischen Pro-Push-Ausloeser,
  # sonst laeuft er nie (dasselbe Muster, das slice-027 fuer make mutate schloss).
  full-smoke:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make full-smoke

  # Der Mutations-Sensor zu AGENTS.md 3.6 (slice-026). Hier bekommt seine
  # Durchsetzung erstmals einen mechanischen Ausloeser PRO PUSH — die
  # Durchsetzungs-Haelfte von Befund N-6. mutate mutiert den Checkout; auf einem
  # eigenen Runner ist das folgenlos.
  mutate:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make mutate

  # NETZ-Sensoren: NUR nachts. Sie erreichen einen Fremd-Host (Kurs-Release);
  # ein Ausfall dort ist kein Defekt DIESES Commits und darf keinen Push roetten.
  # `make` kollabiert einen Nonzero-Exit auf Fehler — der Job meldet Drift oder
  # Netzfehler als rot, aber eben nur im naechtlichen Lauf.
  upstream-drift:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - run: make regelwerk-check
      # `if: '!cancelled()'`: die Netz-Sensoren pruefen UNABHAENGIGE Achsen
      # (Asset-Content vs. Release-Tag je Komponente) — man will ALLE Ergebnisse.
      # Ohne dies liefe der naechste Sensor nicht, sobald ein frueherer Drift meldet
      # (Review-Befund slice-027 F-2). Der Job wird trotzdem rot, wenn einer failt.
      - if: '!cancelled()'
        run: make baseline-freshness
      # Weitere Komponenten-Achsen (slice-040, MR-007): golangci-lint + d-check je
      # gegen ihr Upstream-releases/latest. Jede eigenstaendig, damit eine gemeldete
      # Drift die anderen nicht verschluckt.
      - if: '!cancelled()'
        run: make freshness-golangci
      - if: '!cancelled()'
        run: make freshness-dcheck
