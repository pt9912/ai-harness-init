# CI — der Sensor-Lauf auf frischem Klon (slice-027; Split slice-040ff-Nachzug).
#
# Schliesst die MR-003-Restluecke: der lokale Stop-Hook gibt einen frisch
# geklonten, cleanen Tree OHNE Nachweis frei ("CI ist dort das Netz"). Hier IST
# das Netz. Jeder Job checkt frisch aus und faehrt ein `make`-Target — die CI
# traegt KEINE zweite Definition dessen, was ein Gate ist (MR-010-Geist: eine
# Quelle). Was hier gruen sein muss, ist genau `make gates`/`smoke`/`full-smoke`/`mutate`.
#
# Diese Datei traegt NUR die hermetischen Pro-Push-Sensoren. Die NETZ-Sensoren
# (regelwerk-check, baseline-freshness, freshness-*) leben getrennt in
# upstream-drift.yml (schedule + workflow_dispatch) — ein Upstream-Ausfall darf nie
# einen Push blockieren (slice-027 Paragraph 6; Trennung nach Sensor-Klasse,
# MR-014 Setzung 2, jetzt STRUKTURELL statt per `if: event_name`).
#
# Docker-only (ADR-0003): die Runner bringen Docker mit; keine Host-Go-Toolchain,
# kein `actions/setup-go`. Alles laeuft in den gepinnten Images der make-Targets.

name: ci

on:
  # push deckt direkte main-Pushes (der aktuelle Arbeitsstil), pull_request die
  # Absicherung VOR einem Merge. Bei einem same-repo-Branch-PR triggern beide —
  # ein bewusst akzeptierter Doppellauf (getrennte concurrency-Gruppen, s. u.);
  # der Preis ist ein doppelter Lauf, der Gewinn die Fork-PR-Abdeckung.
  push:
  pull_request:

# Nicht zwei Laeufe DESSELBEN Ausloesers parallel: `make mutate` mutiert den
# Checkout, zwei Laeufe verbrennen CI-Minuten (die Korrektheit ist durch getrennte
# Runner sicher) — den aelteren abbrechen ist billiger. `event_name` in der Gruppe
# haelt push und pull_request desselben Refs auseinander (Geist von Review-Befund
# slice-027 F-1; der schedule-Zweig lebt seit dem Split in upstream-drift.yml).
concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Der Kern: make gates auf FRISCHEM Klon. Genau der Fall, den der lokale
  # Stop-Hook nicht pruefen kann (MR-003).
  gates:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - run: make gates

  # Tier-2-Emit-Smoke (Host-Docker, ggf. Netz-Pull des d-check-Image).
  smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - run: make smoke

  # Voll-E2E-Smoke (slice-024): Bootstrap -> im Ziel der ZUSAMMENGEFUEHRTE make gates
  # (MR-010: docs-check + Go-Gates in einem Lauf) — der LH-FA-01-Happy-Path, dass ein
  # frisch gebootstrapptes Repo out-of-the-box gruen faehrt. Host-Docker + ggf.
  # Netz-Pull, wie smoke; der Sensor braucht diesen mechanischen Pro-Push-Ausloeser,
  # sonst laeuft er nie (dasselbe Muster, das slice-027 fuer make mutate schloss).
  full-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - run: make full-smoke

  # Der Mutations-Sensor zu AGENTS.md 3.6 (slice-026). Hier bekommt seine
  # Durchsetzung erstmals einen mechanischen Ausloeser PRO PUSH — die
  # Durchsetzungs-Haelfte von Befund N-6. mutate mutiert den Checkout; auf einem
  # eigenen Runner ist das folgenlos.
  mutate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5.1.0
      - run: make mutate
