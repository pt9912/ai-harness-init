# Doku-Referenz-Gate. Startgerüst-Quelle: `d-check --print-config`.
# Wächst mit den Artefakten: ids/codepaths/matrix erst aktivieren, wenn
# Targets/roots existieren (sonst Config-Fehler / halluzinierter Gate).
scan:
  roots: ["."]
  # .harness/baseline/: committet vendored Baseline (MR-007) — externer,
  # derivativer Inhalt, nicht repo-autoritativ; vom Doc-Gate ausgenommen. Sie
  # trägt kurs-eigene MR-/ADR-Kennungen (Beispiele, nicht die des Repos), die
  # sonst die ids-Link-Pflicht träfen. Glob ohne <tag>: der Tag-String lebt
  # allein in BASELINE_TAG (Makefile).
  ignore: ["**/*.template.md", ".tmp/**", ".harness/baseline/**"]
modules: [links, anchors, ids, matrix, codepaths, spans]
# Kennungen sind linkpflichtig (auch in Inline-Code, link-policy: always) —
# "klickbar zur Quelle" als gemessenes Property. Literal-schwere Artefakte
# (Review-Reports, CHANGELOG) ausgenommen.
ids:
  patterns:
    - regex: 'ADR-\d{4}'
      target: docs/plan/adr/
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**"]
    - regex: 'LH-[A-Z]{2}-\d{2}'
      target: spec/lastenheft.md
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**"]
    - regex: 'MR-\d{3}'
      target: harness/conventions.md
      link-policy: always
      exempt-paths: [CHANGELOG.md, "docs/reviews/**"]
# Referenz-Richtung (SDP) mechanisch: Spec-Straten verweisen nie abwärts
# auf ADRs/Slices; Verweise auf superseded/deprecated ADRs verboten.
# Provenance nur in den Historie-/Geschichte-Tabellen (ausgenommen).
matrix:
  classes:
    - {name: spec-straten, paths: [spec/lastenheft.md, spec/architecture.md]}
    - {name: adr, paths: ["docs/plan/adr/[0-9]*.md"]}
    - {name: slice, paths: ["docs/plan/planning/**/slice-*.md"]}
  rules:
    - {from: spec-straten, to: adr, allow: false}
    - {from: spec-straten, to: slice, allow: false}
  status: {forbidden: [superseded, deprecated]}
  exclude-sections: [Historie, "7. Historie", Geschichte]
codepaths:
  roots: [spec, docs, harness]                                  # tools/cmd/internal folgen mit dem Go-Code (Phase 3); Harness-Tools liegen unter harness/tools/ (MR-005)
  # check-lines (seit d-check v0.50.0): verifiziert die Zeilen-Referenz eines Inline-Code-Pfads
  # `datei:<von>-<bis>` (Existenz + `bis <= Zeilenzahl` + `von <= bis`). ADDITIVE Härtung am
  # bereits aktiven codepaths (nicht-leerer Prüfbereich) — KEIN eigenständiges Gate, kein neuer
  # Gate-Name (LH-QA-01). Trockenlauf grün über dem realen Korpus (slice-015 / MR-011). Das
  # verbatim-Modul citations bleibt opt-out (0 d-check:cite-Direktiven -> nie feuerndes Gate).
  check-lines: true
  # exempt-paths (datei-weit): Zeitdokumente docs/reviews/** frieren den Stand ihres
  # Review-Laufs ein; Lifecycle-Pfade (next/->in-progress/->done/) darin veralten per
  # Definition. Ersetzt die verstreuten Zeilen-Marker (slice-016 / MR-009).
  exempt-paths: ["docs/reviews/**"]
  # ignore-refs (referenz-weit): Tombstones der in slice-013 geloeschten Ausfuell-Templates
  # (MR-008 — bewusst entfernt, nicht geplant). Normative Doku darf die klaren vollen Pfade
  # nennen statt Glob-Workarounds. Genau die fuenf geloeschten Dateien, keine breite Liste.
  ignore-refs:
    - docs/plan/planning/slice.template.md
    - docs/plan/planning/welle.template.md
    - docs/plan/adr/NNNN-titel.template.md
    - docs/plan/carveouts/carveout.template.md
    - docs/reviews/review-report.template.md
