# Doku-Referenz-Gate — emittiert von ai-harness-init (Adopter-Baseline).
# Startgeruest: `d-check --print-config`. Waechst mit den Artefakten:
# ids/codepaths erst aktivieren, wenn Targets/roots existieren — sonst
# Config-Fehler bzw. ein behaupteter, aber leerer Gate (Modul 13, LH-QA-01).
scan:
  roots: ["."]
  # .harness/**: tool-interne Ablage (gefetchtes Sprachskelett-Staging, slice-004a) —
  # keine Adopter-Doku, vom Doc-Gate ausgenommen.
  ignore: ["**/*.template.md", ".tmp/**", ".harness/**"]
modules: [links, anchors]
# ids:
#   patterns:
#     - {regex: 'ADR-\d{4}', target: docs/plan/adr/}                    # aktivieren, sobald docs/plan/adr/ existiert
#     - {regex: '<PREFIX>-[A-Z]{2}-\d{2}', target: spec/lastenheft.md}  # Praefix setzen; aktivieren, sobald spec/lastenheft.md existiert
# codepaths:
#   roots: [spec, docs, harness]                                        # aktivieren, sobald diese Verzeichnisse existieren
